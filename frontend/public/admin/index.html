<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euro Play & Learn - Scores panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/media/montserrat.css">
    <link rel="stylesheet" href="admin-scores.css">
</head>
<body class="bg-light">
    <div id="login-view" class="container py-5 d-none">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h1 class="h4 mb-4 text-center">Scores panel</h1>
                        <div id="login-error" class="alert alert-danger d-none" role="alert"></div>
                        <form id="login-form">
                            <div class="mb-3">
                                <label for="login-username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="login-username" required autocomplete="username">
                            </div>
                            <div class="mb-4">
                                <label for="login-password" class="form-label">Password</label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="login-password" required autocomplete="current-password">
                                    <button type="button" class="btn btn-outline-secondary" id="toggle-password-btn"
                                            aria-label="Show password" title="Show password">
                                        <span id="icon-eye" class="password-toggle-icon" aria-hidden="true">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                                <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13.8 13.8 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13.8 13.8 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13.8 13.8 0 0 1 1.172 8z"/>
                                                <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                                            </svg>
                                        </span>
                                        <span id="icon-eye-slash" class="password-toggle-icon d-none" aria-hidden="true">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                                <path d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7 7 0 0 0-2.79.588l.77.771A6 6 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.8 13.8 0 0 1 14.828 8q-.086.13-.195.288q-.35.474-.665 1.036z"/>
                                                <path d="M11.297 9.176a3.5 3.5 0 0 0-4.474-4.474l.823.823a2.5 2.5 0 0 1 2.829 2.829zm-2.943 1.299.822.822a3.5 3.5 0 0 1-4.474-4.474l.823.823a2.5 2.5 0 0 0 2.829 2.829"/>
                                                <path d="M3.35 5.47q-.27.24-.518.487A13.8 13.8 0 0 0 1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332 5.881 12.5 8 12.5c.716 0 1.39-.133 2.02-.36l.77.772A7 7 0 0 1 8 13.5C5 13.5 0 8 0 8s3-5.5 8-5.5c.926 0 1.797.133 2.606.357zm3.584-2.465z"/>
                                                <path fill-rule="evenodd" d="M13.646 14.354l-12-12 .708-.708 12 12z"/>
                                            </svg>
                                        </span>
                                    </button>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-admin w-100" id="login-submit">Sign in</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="panel-view" class="d-none">
        <nav class="navbar navbar-expand-lg admin-navbar mb-4">
            <div class="admin-panel-main navbar-inner">
                <div class="admin-navbar-brand">
                    <img src="/img/2favicon.png" alt="" class="admin-navbar-logo" width="40" height="40">
                    <span class="navbar-brand mb-0 h1">Scores panel</span>
                </div>
                <button type="button" class="btn btn-admin btn-sm" id="logout-btn">Sign out</button>
            </div>
        </nav>

        <div class="admin-panel-main pb-5">
            <div id="panel-error" class="alert alert-danger d-none" role="alert"></div>

            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <form id="filters-form" class="row g-3 align-items-center">
                        <div class="col">
                            <input type="text" class="form-control" id="filter-search"
                                   placeholder="Filter by name, email" aria-label="Filter by name, email">
                        </div>
                        <div class="col-auto d-flex gap-2">
                            <button type="submit" class="btn btn-admin">Search</button>
                            <button type="button" class="btn btn-admin" id="clear-filters-btn">Clear</button>
                            <button type="button" class="btn btn-success" id="export-btn">Export Excel</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-striped mb-0">
                            <thead class="admin-thead">
                                <tr>
                                    <th scope="col" data-sort="username" class="sortable">Player</th>
                                    <th scope="col" data-sort="email" class="sortable">Email</th>
                                    <th scope="col" data-sort="total_score" class="sortable text-end">Score</th>
                                    <th scope="col" data-sort="completed_at" class="sortable">Completed</th>
                                </tr>
                            </thead>
                            <tbody id="scores-tbody">
                                <tr>
                                    <td colspan="4" class="text-center text-muted py-4">Loading…</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="card-footer admin-card-footer d-flex flex-wrap justify-content-between align-items-center gap-2">
                    <span id="pagination-info" class="text-muted small"></span>
                    <div class="admin-footer-actions d-flex flex-wrap align-items-center gap-3 ms-auto">
                        <nav aria-label="Pagination">
                            <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
                        </nav>
                        <div class="page-size-control d-flex align-items-center gap-2">
                            <label for="page-size" class="form-label mb-0 small text-muted text-nowrap">Page size</label>
                            <select id="page-size" class="form-select form-select-sm" aria-label="Page size">
                                <option value="10">10</option>
                                <option value="25" selected>25</option>
                                <option value="50">50</option>
                                <option value="100">100</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="admin-scores.js"></script>
</body>
</html>
