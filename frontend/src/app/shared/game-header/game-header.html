<header class="game-header" [class.game-header--banner]="variant === 'banner'">
    @if (variant === 'default') {
        <span class="game-header__user">{{ auth.user()?.username }}</span>
        <span class="game-header__score">{{ score }} <span class="game-header__score-unit">points</span></span>
    } @else {
        <div class="game-header__banner-info">
            <p class="game-header__user">{{ auth.user()?.username }}</p>
            <p class="game-header__label">Score</p>
            <p class="game-header__score">{{ score }} <span class="game-header__score-unit">points</span></p>
        </div>
        <div class="game-header__logo">
            <img
                class="game-header__logo-img"
                src="/img/logo-horizontal.png"
                alt="Digital Euro Learn and Play"
                width="2000"
                height="1169" />
        </div>
    }
</header>
