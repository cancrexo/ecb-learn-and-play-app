<div class="screen auth">
    <app-brand-logo />
    <div class="auth__panel">
        <h1 class="auth__title">Reset password</h1>
        @if (linkInvalid()) {
            <p class="auth__error">Invalid or incomplete reset link.</p>
            <p class="auth__subtitle">Request a new link from the forgot password page.</p>
            <p class="auth__link"><a routerLink="/forgot-password">Forgot password</a></p>
        } @else {
            <p class="auth__subtitle">Choose a new password for {{ email }}.</p>
            <form (ngSubmit)="submit()" class="auth__form">
                <label>
                    <input
                        type="password"
                        [(ngModel)]="password"
                        name="password"
                        placeholder="New password"
                        required
                        minlength="6"
                    />
                </label>
                <label>
                    <input
                        type="password"
                        [(ngModel)]="passwordConfirmation"
                        name="passwordConfirmation"
                        placeholder="Confirm new password"
                        required
                        minlength="6"
                    />
                </label>
                @if (error()) {
                    <p class="auth__error">{{ error() }}</p>
                }
                <button type="submit" class="btn btn--primary">Reset password</button>
            </form>
        }
    </div>
    @if (!linkInvalid()) {
        <p class="auth__link"><a routerLink="/login">Back to login</a></p>
    }
</div>
