<div class="screen auth">
    <div class="auth__panel">
        <h1 class="auth__title">Register</h1>
        <p class="auth__subtitle">Exclusive for ECB participants, with an email from the ECB.</p>
        <form (ngSubmit)="submit()" class="auth__form">
            <label>
                <input type="text" [(ngModel)]="username" name="username" placeholder="User name" required />
            </label>
            <label>
                <app-dropdown
                    [(ngModel)]="departmentId"
                    name="departmentId"
                    [options]="departmentOptions"
                    placeholder="Department"
                    required
                />
            </label>
            <label>
                <input type="email" [(ngModel)]="email" name="email" placeholder="Email from the ECB" required />
            </label>
            <label>
                <div class="auth__password-wrap">
                    <input
                        [type]="showPassword ? 'text' : 'password'"
                        [(ngModel)]="password"
                        name="password"
                        placeholder="Password"
                        required
                        minlength="6"
                    />
                    <button
                        type="button"
                        class="auth__password-toggle"
                        (click)="showPassword = !showPassword"
                        [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
                    >
                        @if (showPassword) {
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                                <line x1="1" y1="1" x2="23" y2="23" />
                            </svg>
                        } @else {
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        }
                    </button>
                </div>
            </label>
            <label class="auth__checkbox">
                <input type="checkbox" [(ngModel)]="acceptDataProtection" name="acceptDataProtection" required />
                I have read the <a [href]="dataProtectionNoticeUrl" target="_blank" rel="noopener noreferrer">Data Protection Notice</a>.
            </label>
            @if (error()) {
                <p class="auth__error">{{ error() }}</p>
            }
            <button type="submit" class="btn btn--primary" [disabled]="!acceptDataProtection">Register</button>
        </form>
    </div>
    <p class="auth__link">Already have an account? <a routerLink="/login">Login</a></p>
</div>
