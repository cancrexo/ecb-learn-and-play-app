<div class="screen auth">
    <div class="auth__panel">
        <h1 class="auth__title">Login</h1>
        <form (ngSubmit)="submit()" class="auth__form">
            <label>
                <input type="text" [(ngModel)]="login" name="login" placeholder="Username or email" required />
            </label>
            <label>
                <div class="auth__password-wrap">
                    <input
                        [type]="showPassword ? 'text' : 'password'"
                        [(ngModel)]="password"
                        name="password"
                        placeholder="Password"
                        required
                    />
                    <button
                        type="button"
                        class="auth__password-toggle"
                        (click)="showPassword = !showPassword"
                        [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
                    >
                        @if (showPassword) {
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                                <line x1="1" y1="1" x2="23" y2="23" />
                            </svg>
                        } @else {
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        }
                    </button>
                </div>
            </label>
            @if (error()) {
                <p class="auth__error">{{ error() }}</p>
            }
            <button type="submit" class="btn btn--primary">Login</button>
        </form>
    </div>
    <p class="auth__link">Don't have an account? <a routerLink="/register">Register</a></p>
    <p class="auth__link"><a routerLink="/forgot-password">Forgot password?</a></p>
</div>
