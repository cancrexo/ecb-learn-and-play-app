<div class="screen auth">
    <app-brand-logo />
    <div class="auth__panel">
        <h1 class="auth__title">Forgot password</h1>
        @if (!sent()) {
            <p class="auth__subtitle">Enter your email and we will send you a reset link.</p>
            <form (ngSubmit)="submit()" class="auth__form">
                <label>
                    <input type="email" [(ngModel)]="email" name="email" placeholder="Email" required />
                </label>
                @if (error()) {
                    <p class="auth__error">{{ error() }}</p>
                }
                <button type="submit" class="btn btn--primary">Send reset link</button>
            </form>
        } @else {
            @if (info()) {
                <p class="auth__info">{{ info() }}</p>
            }
            <p class="auth__subtitle">Check your inbox and open the link to set a new password.</p>
        }
    </div>
    <p class="auth__link"><a routerLink="/login">Back to login</a></p>
</div>
