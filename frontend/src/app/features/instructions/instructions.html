<div class="screen screen--bg-full instructions">
    <div class="instructions">
        <h1 class="instructions__title">Digital Euro Learn&amp;Play</h1>
        <p class="instructions__subtitle">How to play</p>
        <ul>
            <li>Complete 4 clusters of questions about the digital euro.</li>

            <li>You must finish the game once started.</li>
