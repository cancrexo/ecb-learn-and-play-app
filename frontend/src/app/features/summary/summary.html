<div class="screen summary">
    <h1>Great job completing the<br>{{ clusterLabel() }} cluster!</h1>
    <p class="summary__label">YOU SCORED</p>
    <p class="summary__score">{{ clusterScore() }} POINTS</p>
    <p class="summary__total">Total: {{ totalScore() }} points</p>

    <div class="summary__actions">
        <button type="button" class="btn btn--primary" (click)="continue()">CONTINUE</button>
        <button type="button" class="btn btn--secondary" (click)="pause()">PAUSE</button>
    </div>
</div>
